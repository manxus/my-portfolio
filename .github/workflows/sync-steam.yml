name: Sync Steam Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/cache@v4
        id: steam-cache
        with:
          path: scripts/.steam-fetch-cache
          key: steam-fetch-v1-${{ hashFiles('scripts/fetch-steam-data.js') }}
          restore-keys: |
            steam-fetch-v1-

      - name: Fetch Steam data
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
        run: node scripts/fetch-steam-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/steam-library.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync steam library data"
            git push
          else
            echo "No changes to steam-library.json, skipping commit."
          fi
